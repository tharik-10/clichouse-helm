apiVersion: batch/v1
kind: CronJob
metadata:
  name: clickhouse-cleanup
spec:
  schedule: "{{ .Values.cleanup.schedule }}"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cleanup
              image: busybox
              command:
                - /bin/sh
                - -c
                - |
                  find /var/log -type f -mtime +{{ .Values.cleanup.logRetentionDays }} -delete
          restartPolicy: OnFailure
